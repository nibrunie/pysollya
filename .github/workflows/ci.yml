name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev \
            libmpfr-dev \
            libmpfi-dev \
            libfplll-dev \
            libxml2-dev \
            autoconf \
            automake \
            libtool

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools cython pytest

      - name: Build and install pysollya
        run: |
          pip install .

      - name: Run tests
        run: |
          pytest tests/ -v
